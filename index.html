<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永義房屋 - 獲利試算巔峰版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-red: #ff3b30;
            --yung-green: #008C4A;
            --yung-gold: #FDB913;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-stroke: rgba(255, 255, 255, 0.4);
            --text-main: #1d1d1f;
            --text-note: #86868b;
        }

        /* 💡 巔峰背景：動態光影 */
        body {
            font-family: -apple-system, "SF Pro TC", "PingFang TC", sans-serif;
            background: #f5f5f7;
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 20%, #fff9e6 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, #fff3d1 0%, transparent 40%);
            z-index: -1;
        }

        /* 🍎 按鈕組：iOS 系統級質感 */
        .ui-controls { width: 800px; padding: 40px 0; z-index: 10; }
        .btn-group { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-group button { 
            border: none; padding: 16px 0; border-radius: 18px; cursor: pointer; 
            font-size: 17px; font-weight: 600; flex: 1; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .btn-calc { background: var(--apple-blue); color: white; }
        .btn-share { background: white; color: var(--apple-blue); border: 1.5px solid var(--apple-blue) !important; }
        .btn-pc { background: #1d1d1f; color: white; }
        .btn-group button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }

        /* 雙欄控制面板 */
        .control-panel { 
            background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 40px; border-radius: 35px; border: 1px solid var(--glass-stroke);
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px 40px;
            margin-bottom: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.03);
        }
        .input-group label { display: block; font-weight: 700; margin-bottom: 12px; font-size: 14px; color: var(--text-note); }
        input, select { 
            width: 100%; padding: 15px; border-radius: 14px; border: 1px solid #d2d2d7;
            font-size: 18px; box-sizing: border-box; background: rgba(255,255,255,0.8); font-weight: 600;
        }
        input:focus { border-color: var(--apple-blue); outline: none; box-shadow: 0 0 0 4px rgba(0,113,227,0.15); }

        /* 🍎 A4 輸出主容器 */
        #output-container {
            width: 800px; background: #ffffff; padding: 60px; box-sizing: border-box;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.08); margin-bottom: 60px;
        }

        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 45px; }
        .brand-logo-img { height: 75px; }
        .report-title { color: var(--yung-green); font-size: 36px; font-weight: 900; margin: 0; letter-spacing: -1.5px; }

        /* 巔峰條件摘要 ( image_8d1119 ) */
        .summary-panel {
            background: #fbfbfd; border: 1px solid #f2f2f7;
            padding: 35px; margin-bottom: 50px; border-radius: 28px;
        }
        .summary-title { font-size: 26px; font-weight: 800; color: var(--yung-green); margin-bottom: 20px; display: block; }
        .summary-row { display: flex; border-top: 1px solid #eee; padding: 15px 0; }
        .summary-line { flex: 1; font-size: 20px; color: #424245; font-weight: 500; }
        .summary-line b { color: var(--text-main); font-size: 22px; font-weight: 800; margin: 0 5px; }

        /* 表格設計 ( image_8dfa51 ) */
        table { width: 100%; border-collapse: separate; border-spacing: 0 20px; position: relative; z-index: 1; table-layout: fixed; }
        th { padding: 15px 5px; text-align: center; vertical-align: top; border-bottom: 1.5px solid #f2f2f7; }
        .th-title { font-size: 16px; color: var(--text-main); font-weight: 700; display: block; margin-bottom: 6px; }
        .th-note { font-size: 11px; color: #a1a1a6; font-weight: 500; display: block; letter-spacing: 0.2px; }

        td { padding: 30px 5px; text-align: center; vertical-align: middle; border-bottom: 1px solid #fbfbfd; }
        .col-price { font-size: 32px; color: #1c3d73; font-weight: 800; letter-spacing: -1.5px; }
        .col-net { font-size: 36px; color: var(--apple-red); font-weight: 900; letter-spacing: -1.5px; }
        .col-data { font-size: 22px; color: #424245; font-weight: 600; }
        
        .tag-pill {
            display: inline-block; font-size: 12px; font-weight: 800;
            background: rgba(0, 140, 74, 0.08); color: var(--yung-green);
            padding: 4px 12px; border-radius: 8px; margin-top: 8px;
        }

        /* 頁腳 */
        .footer { 
            margin-top: 60px; padding-top: 40px; border-top: 1.5px solid #f2f2f7;
            display: flex; justify-content: space-between; align-items: flex-end; color: #86868b; font-size: 15px;
        }
        .footer strong { font-size: 22px; color: var(--text-main); display: block; margin-bottom: 8px; font-weight: 800; }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; opacity: 0.08; pointer-events: none; z-index: 0; }

        @media (max-width: 800px) {
            .ui-controls { width: 95%; }
            #output-container { transform: scale(0.45); transform-origin: top center; margin-bottom: -500px; }
        }
    </style>
</head>
<body>

<div class="ui-controls">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">重新計算</button>
        <button class="btn-share" onclick="handleMobileShare()">手機儲存相片</button>
        <button class="btn-pc" onclick="handlePCDownload()">電腦儲存相片</button>
    </div>

    <div class="control-panel">
        <div class="input-group"><label>買入價格 (萬)</label><input type="number" id="costPrice" value="886" oninput="generateTable()"></div>
        <div class="input-group"><label>列舉裝潢 (萬)</label><input type="number" id="renoCost" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買方仲介費 (萬)</label><input type="number" id="buyAg" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買入規費 (萬)</label><input type="number" id="buyFe" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>基準成交預估 (萬)</label><input type="number" id="basePrice" value="1500" oninput="generateTable()"></div>
        <div class="input-group">
            <label>賣方服務費</label>
            <div style="display:flex; gap:10px;">
                <select id="feeType" onchange="generateTable()" style="flex:0.7;"><option value="percent">%</option><option value="fixed">萬</option></select>
                <input type="number" id="agencyVal" value="4" oninput="generateTable()" style="flex:1.3;">
            </div>
        </div>
        <div class="input-group">
            <label>房地合一稅率</label>
            <select id="taxRate" onchange="generateTable()">
                <option value="45">45% (持有 2 年內)</option>
                <option value="35">35% (持有 2-5 年)</option>
                <option value="20" selected>20% (持有超過 5 年)</option>
                <option value="10">設籍自住滿 6 年 (400 萬免稅) 10%</option>
            </select>
        </div>
        <div class="input-group"><label>顯示筆數</label><input type="number" id="rowCount" value="6" oninput="generateTable()"></div>
    </div>
</div>

<div id="output-container">
    <div class="report-header">
        <img src="logo.png" class="brand-logo-img" alt="LOGO">
        <h1 class="report-title">成屋獲利對照報告</h1>
    </div>

    <div class="summary-panel">
        <span class="summary-title">報告設定條件：</span>
        <div class="summary-row">
            <div class="summary-line" id="sumLine1">取得成本：買入 <b>886</b> | 裝潢 <b>0</b></div>
            <div class="summary-line" id="sumLine2">買方稅費：仲介 <b>0</b> | 規費 <b>0</b></div>
        </div>
        <div class="summary-row">
            <div class="summary-line" id="sumLine3">稅務設定：稅率 <b>20%</b></div>
            <div class="summary-line" id="sumLine4">賣方服務：<b>4%</b></div>
        </div>
    </div>

    <div class="report-content">
        <img src="logo浮水印.png" class="watermark" alt="浮水印" onerror="this.style.display='none'">
        <table>
            <thead>
                <tr>
                    <th><span class="th-title">成交價</span><span class="th-note">(預估成交金額)</span></th>
                    <th><span class="th-title">實付費用</span><span class="th-note">(仲介費+規費)</span></th>
                    <th><span class="th-title">抵扣費用</span><span class="th-note">(擇優:實際或3%)</span></th>
                    <th><span class="th-title">房地稅額</span><span class="th-note">(所得 × 稅率)</span></th>
                    <th><span class="th-title">淨獲利</span><span class="th-note">(賣價-成本-費-稅)</span></th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            雲林縣斗六市成功二街126號
        </div>
        <div style="text-align:right;">
            製表時間：<span id="dateDisplay"></span><br>
            免責聲明：實際稅額以國稅局核定為準。
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renoCost').value) || 0;
        const buyAg = parseFloat(document.getElementById('buyAg').value) || 0;
        const buyFe = parseFloat(document.getElementById('buyFe').value) || 0;
        const base = parseFloat(document.getElementById('basePrice').value) || 1500;
        const feeType = document.getElementById('feeType').value;
        const agencyVal = parseFloat(document.getElementById('agencyVal').value) || 0;
        const taxRateSelect = document.getElementById('taxRate');
        const taxVal = parseFloat(taxRateSelect.value);
        const taxText = taxRateSelect.options[taxRateSelect.selectedIndex].text;
        const rows = parseInt(document.getElementById('rowCount').value) || 6;

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();
        
        // 摘要面板連動
        document.getElementById('sumLine1').innerHTML = `取得成本：買入 <b>${cost}</b> | 裝潢 <b>${reno}</b>`;
        document.getElementById('sumLine2').innerHTML = `買方稅費：仲介 <b>${buyAg}</b> | 規費 <b>${buyFe}</b>`;
        document.getElementById('sumLine3').innerHTML = `稅務設定：稅率 <b>${taxText.split(' ')[0]}</b>`;
        document.getElementById('sumLine4').innerHTML = `賣方服務：<b>${feeType === 'percent' ? agencyVal + '%' : agencyVal + '萬'}</b>`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        for(let i=0; i < rows; i++) {
            let price = base - (i * 10);
            let sellAgency = (feeType === 'percent') ? (price * (agencyVal / 100)) : agencyVal;
            let deduc = Math.max(sellAgency, Math.min(price * 0.03, 30));
            let totalCost = cost + reno + buyAg + buyFe;
            let rawProfit = price - totalCost - deduc;
            let tax = (taxVal === 10) ? Math.max(0, rawProfit - 400) * 0.1 : Math.max(0, rawProfit) * (taxVal / 100);
            let net = price - totalCost - sellAgency - tax;

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td class="col-data">${sellAgency.toFixed(1)}</td>
                <td><span class="col-data">${deduc.toFixed(1)}</span><br><span class="tag-pill">${sellAgency >= Math.min(price * 0.03, 30) ? '採服務費' : '採免稅額'}</span></td>
                <td><span class="col-data">${tax.toFixed(1)}</span><br><span class="th-note">(${taxText.split(' ')[0]} 稅率)</span></td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    async function captureAndProcess() {
        const target = document.getElementById('output-container');
        // 核心修正：強迫 canvas 在擷取時不要考慮瀏覽器視角，只考慮內容
        const canvas = await html2canvas(target, { 
            scale: 3, 
            useCORS: true, 
            backgroundColor: "#ffffff",
            width: 800,
            height: target.scrollHeight,
            onclone: (clonedDoc) => {
                const el = clonedDoc.getElementById('output-container');
                el.style.transform = 'none';
                el.style.margin = '0';
            }
        });
        return canvas;
    }

    async function handleMobileShare() {
        const canvas = await captureAndProcess();
        canvas.toBlob(async (blob) => {
            const file = new File([blob], '獲利報告.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '獲利試算' });
            }
        });
    }

    async function handlePCDownload() {
        const canvas = await captureAndProcess();
        const a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = '永義房屋報告.png'; a.click();
    }
    window.onload = generateTable;
</script>
</body>
</html>
