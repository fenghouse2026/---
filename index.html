<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永義房屋斗六成功莊敬店 - 獲利精算終極美學版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-blue: #0071e3;
            --yung-green: #008C4A;
            --yung-red: #ff3b30;
            --yung-gold: #FDB913; /* 琥珀金 Logo 色 */
            --glass-bg: rgba(255, 255, 255, 0.65); /* 通透磨砂 */
            --glass-stroke: rgba(253, 185, 19, 0.3); /* 帶 Logo 色的水晶光邊 */
            --text-main: #1d1d1f;
        }

        /* 💡 巔峰大改版：全視窗流體極光背景 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "PingFang TC", sans-serif;
            background-color: var(--apple-bg);
            margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* 動態極光光斑動畫 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(253, 185, 19, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 140, 74, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 249, 230, 0.8) 0%, transparent 60%);
            z-index: -2;
            filter: blur(80px); -webkit-filter: blur(80px);
            animation: gradient-flow 15s infinite alternate;
        }

        @keyframes gradient-flow {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(30px, 20px); }
            100% { transform: scale(0.9) translate(-20px, -30px); }
        }

        /* 💡 大面積毛玻璃磨砂疊加層 */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: -1;
        }

        /* 按鈕組：iOS 簡約藥丸 */
        .ui-controls { width: 800px; z-index: 100; margin-bottom: 30px; }
        .btn-group { display: flex; gap: 12px; margin-bottom: 25px; }
        .btn-group button { 
            border: none; padding: 12px 0; border-radius: 20px; cursor: pointer; 
            font-size: 14px; font-weight: 600; flex: 1; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-calc { background: var(--apple-blue); color: white; }
        .btn-share { background: rgba(0,0,0,0.05); color: var(--apple-blue); }
        .btn-pc { background: #1d1d1f; color: white; }
        .btn-group button:hover { opacity: 0.8; transform: scale(1.02); }

        /* 控制面板：通透水晶質感 */
        .control-panel { 
            background: var(--glass-bg);
            padding: 35px; border-radius: 20px; 
            border: 1.5px solid var(--glass-stroke); /* 帶有琥珀色微光的分隔線 */
            display: grid; grid-template-columns: 1fr 1fr; gap: 24px 40px; margin-bottom: 40px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.03), inset 0 0 10px rgba(255,255,255,0.4);
        }
        .input-group label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 12px; color: #8a6d1a; text-transform: uppercase; letter-spacing: 0.5px;}
        input, select { 
            width: 100%; padding: 12px; border: none; border-bottom: 1px solid #d2d2d7;
            font-size: 18px; background: transparent; color: var(--text-main); font-weight: 700; border-radius: 0;
        }
        input:focus { border-bottom: 1px solid var(--apple-blue); outline: none; }

        /* 🍎 A4 輸出容器 - 💡 修復高度問題並融入琥珀光暈 */
        #output-container {
            width: 800px; min-height: auto;
            background: #ffffff; /* 匯出底色維持純白確保印刷質感 */
            padding: 80px 60px; box-sizing: border-box;
            display: flex; flex-direction: column; position: relative;
            border-radius: 4px; /* 擷取時邊角會自然裁切 */
            box-shadow: 0 40px 100px rgba(0,0,0,0.08); margin-bottom: 50px;
            z-index: 1;
        }

        .report-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; }
        .brand-logo-img { height: 60px; }
        .report-title { color: var(--text-main); font-size: 40px; font-weight: 700; margin: 0; letter-spacing: -1.2px; }

        /* 條件摘要：極簡細線風 (image_8e0c02) */
        .summary-panel {
            border-top: 1px solid #d2d2d7; border-bottom: 1px solid #d2d2d7;
            padding: 30px 0; margin-bottom: 40px;
        }
        .summary-title { font-size: 14px; font-weight: 700; color: var(--yung-green); margin-bottom: 20px; display: block; letter-spacing: 1px; }
        .summary-line { font-size: 19px; color: var(--text-main); font-weight: 600; line-height: 2.2; }
        .summary-line b { color: #000; font-size: 21px; margin: 0 4px; font-weight: 800; }

        /* 💡 提示列：水晶磨砂質感 (image_8e7d5a) */
        .hint-bar {
            background: rgba(0, 113, 227, 0.05); border-radius: 12px;
            padding: 14px 20px; margin-bottom: 50px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 15px; font-weight: 600; color: var(--apple-blue);
        }

        /* 🍎 表格區：移除框線，像官網一樣乾淨 */
        table { width: 100%; border-collapse: collapse; position: relative; z-index: 1; table-layout: fixed; }
        th { font-size: 14px; color: #86868b; font-weight: 600; padding: 20px 0; text-align: center; }
        .th-note { font-size: 11px; color: #a1a1a6; font-weight: 400; display: block; margin-top: 4px; }
        
        td { padding: 40px 0; text-align: center; vertical-align: middle; border-top: 1px solid #d2d2d7; }
        
        /* 數值清晰度巅峰：SF Pro 風格 */
        .col-price { font-size: 32px; color: var(--text-main); font-weight: 700; letter-spacing: -1px; }
        .col-main-data { font-size: 24px; color: var(--text-main); font-weight: 700; }
        .col-net { font-size: 42px; color: var(--yung-red); font-weight: 800; letter-spacing: -1.5px; }
        .data-note { font-size: 12px; color: #64748b; font-weight: 500; display: block; margin-top: 8px; }

        /* 頁腳 */
        .footer { margin-top: 60px; padding-top: 40px; border-top: 1px solid #d2d2d7; display: flex; justify-content: space-between; align-items: flex-end; }
        .footer-left strong { font-size: 24px; color: var(--text-main); display: block; margin-bottom: 8px; font-weight: 700; }
        .footer-left span { font-size: 16px; color: #555; font-weight: 500; }
        .footer-right { text-align: right; color: #777; font-size: 12px; line-height: 1.8; }

        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; opacity: 0.05; pointer-events: none; z-index: 0; }

        @media (max-width: 800px) {
            .ui-controls { width: 95%; }
            #output-container { transform: scale(0.42); transform-origin: top center; margin-bottom: -650px; }
        }
    </style>
</head>
<body>

<div class="ui-controls">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">重新試算數據</button>
        <button class="btn-share" onclick="handleMobileShare()">手機儲存相片</button>
        <button class="btn-pc" onclick="handlePCDownload()">儲存 A4 圖檔</button>
    </div>

    <div class="control-panel">
        <div class="input-group"><label>買入總價 (萬)</label><input type="number" id="costPrice" value="886" oninput="generateTable()"></div>
        <div class="input-group"><label>裝潢成本 (萬)</label><input type="number" id="renoCost" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買方仲介費 (萬)</label><input type="number" id="buyAg" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買入規費 (萬)</label><input type="number" id="buyFe" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>基準成交預估 (萬)</label><input type="number" id="basePrice" value="1500" oninput="generateTable()"></div>
        <div class="input-group">
            <label>賣方服務費 (%)</label>
            <input type="number" id="agencyVal" value="4" oninput="generateTable()">
        </div>
        <div class="input-group">
            <label>房地合一稅率</label>
            <select id="taxRate" onchange="generateTable()">
                <option value="45">45% (持有 2 年內)</option>
                <option value="35">35% (持有 2-5 年)</option>
                <option value="20" selected>20% (持有超過 5 年)</option>
                <option value="10">設籍且自住滿 6 年 (400 萬免稅額) 10%</option>
            </select>
        </div>
        <div class="input-group"><label>顯示筆數</label><input type="number" id="rowCount" value="6" oninput="generateTable()"></div>
    </div>
</div>

<div id="output-container">
    <div class="report-header">
        <img src="logo.png" class="brand-logo-img" alt="LOGO">
        <h1 class="report-title">成屋獲利對照報告</h1>
    </div>

    <div class="summary-panel">
        <span class="summary-title">報告設定條件：</span>
        <div class="summary-line" id="sumLine1">取得：買入 <b>886</b> | 裝潢 <b>0</b> | 買仲 <b>0</b> | 規費 <b>0</b></div>
        <div class="summary-line" id="sumLine2">稅務：稅率 <b>20%</b> | 賣仲費 <b>4%</b> | 賣出規費 <b>0</b></div>
    </div>

    <div class="hint-bar">
        <span>💡</span> 系統已自動選擇最優抵扣費用 (實付仲介費 vs 免稅額3%最高30萬)
    </div>

    <div class="report-content">
        <img src="logo浮水印.png" class="watermark" alt="浮水印" onerror="this.style.display='none'">
        <table>
            <thead>
                <tr>
                    <th style="width:19%">成交價<span class="th-note">(預估成交)</span></th>
                    <th style="width:15%">服務費<span class="th-note">(支出成本)</span></th>
                    <th style="width:23%">課稅所得<span class="th-note">(成交-成本-抵扣)</span></th>
                    <th style="width:21%">房地稅額<span class="th-note">(所得×稅率)</span></th>
                    <th style="width:22%">最終淨獲利<span class="th-note">(實拿結案)</span></th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            <span>雲林縣斗六市成功二街126號</span>
        </div>
        <div style="text-align:right;">
            製表日期：<span id="dateDisplay"></span><br>
            實際稅額以國稅局核定為準。
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renoCost').value) || 0;
        const buyAg = parseFloat(document.getElementById('buyAg').value) || 0;
        const buyFe = parseFloat(document.getElementById('buyFe').value) || 0;
        const base = parseFloat(document.getElementById('basePrice').value) || 1500;
        const agencyVal = parseFloat(document.getElementById('agencyVal').value) || 0;
        const taxRateSelect = document.getElementById('taxRate');
        const taxVal = parseFloat(taxRateSelect.value);
        const taxText = taxRateSelect.options[taxRateSelect.selectedIndex].text;
        const rows = parseInt(document.getElementById('rowCount').value) || 6;

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();
        document.getElementById('sumLine1').innerHTML = `取得：買入 <b>${cost}</b> | 裝潢 <b>${reno}</b> | 買仲 <b>${buyAg}</b> | 規費 <b>${buyFe}</b>`;
        document.getElementById('sumLine2').innerHTML = `稅務：稅率 <b>${taxText.split(' ')[0]}</b> | 賣仲費 <b>${agencyVal}%</b> | 賣出規費 <b>0</b>`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        for(let i=0; i < rows; i++) {
            let price = base - (i * 10);
            let sellAgency = price * (agencyVal / 100);
            let deduc = Math.max(sellAgency, Math.min(price * 0.03, 30));
            let totalAcq = cost + reno + buyAg + buyFe;
            let rawProfit = price - totalAcq - deduc;
            let tax = (taxVal === 10) ? Math.max(0, rawProfit - 400) * 0.1 : Math.max(0, rawProfit) * (taxVal / 100);
            let net = price - totalAcq - sellAgency - tax;

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td class="col-main-data">${sellAgency.toFixed(1)}</td>
                <td>
                    <span class="col-main-data">${rawProfit.toFixed(1)}</span>
                    <span class="data-note">(抵扣 ${deduc.toFixed(1)} [${sellAgency >= Math.min(price * 0.03, 30) ? '採服務費' : '採免稅額'}])</span>
                </td>
                <td>
                    <span class="col-main-data">${tax.toFixed(1)}</span>
                    <span class="data-note">(${taxText.split('%')[0]}% 稅)</span>
                </td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    // 💡 特殊優化：擷取時強迫 canvas 不擷取 body 背景，只擷取內容高度並鎖定寬度
    async function captureAndProcess() {
        const target = document.getElementById('output-container');
        const canvas = await html2canvas(target, { 
            scale: 4, 
            useCORS: true, 
            backgroundColor: null, // 透明背景，確保存圖後質感
            width: 800,
            height: target.offsetHeight, // 💡 強制使用實際內容高度解決留白
            onclone: (clonedDoc) => {
                const el = clonedDoc.getElementById('output-container');
                el.style.transform = 'none';
                el.style.margin = '0';
                // 💡 針對克隆物件強化琥珀金流體光暈與水晶邊邊 (image_8edad2)
                el.style.background = "linear-gradient(160deg, rgba(255,255,255,0.99) 0%, rgba(255,253,240,0.96) 100%)";
                el.style.boxShadow = "none";
                el.style.borderRadius = "0";
                // 此處不再手動疊加模糊層，避免 html2canvas 產出的圖片變灰
            }
        });
        return canvas;
    }

    async function handleMobileShare() {
        const canvas = await captureAndProcess();
        canvas.toBlob(async (blob) => {
            const file = new File([blob], '獲利試算.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '獲利試算報告' });
            }
        });
    }

    async function handlePCDownload() {
        const canvas = await captureAndProcess();
        const a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = '永義房屋獲利報告.png'; a.click();
    }
    window.onload = generateTable;
</script>
</body>
</html>
