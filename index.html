<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永義房屋 - 商務巔峰試算 (最終穩定版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --apple-blue: #0071e3;
            --yung-green: #008C4A;
            --yung-red: #D82A29;
            --yung-gold: #FDB913;
            --glass-bg: rgba(255, 253, 240, 0.7);
            --text-dark: #1d1d1f;
            --text-gray: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "PingFang TC", sans-serif;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; -webkit-font-smoothing: antialiased;
        }

        /* 控制按鈕區 */
        .ui-controls { width: 800px; padding: 30px 0; z-index: 10; }
        .btn-group { display: flex; gap: 12px; margin-bottom: 25px; }
        .btn-group button { 
            border: none; padding: 14px 0; border-radius: 18px; cursor: pointer; 
            font-size: 16px; font-weight: 800; flex: 1; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .btn-calc { background: var(--apple-blue); color: white; }
        .btn-share { background: white; color: var(--apple-blue); border: 1.5px solid var(--apple-blue) !important; }
        .btn-pc { background: #1d1d1f; color: white; }

        /* 雙欄控制面板 */
        .control-panel { 
            background: rgba(255, 255, 255, 0.85); padding: 35px; border-radius: 28px; border: 1px solid #d2d2d7;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 30px; margin-bottom: 30px;
        }
        .input-group label { display: block; font-weight: 800; margin-bottom: 8px; font-size: 13px; color: var(--yung-green); }
        input, select { 
            width: 100%; padding: 13px; border-radius: 12px; border: 1.5px solid #d2d2d7;
            font-size: 16px; box-sizing: border-box; background: white; font-weight: 700;
        }

        /* 🍎 A4 輸出容器 - 💡 特殊：存圖時強迫背景為琥珀金玻璃 */
        #output-container {
            width: 800px; 
            background: linear-gradient(135deg, #fffef5 0%, #fff9e6 100%);
            padding: 50px 60px; box-sizing: border-box;
            display: flex; flex-direction: column; position: relative;
            border-radius: 4px; box-shadow: 0 30px 60px rgba(0,0,0,0.08); margin-bottom: 50px;
        }

        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 3px solid var(--yung-gold); padding-bottom: 15px; }
        .brand-logo-img { height: 75px; }
        .report-title { color: var(--yung-green); font-size: 32px; font-weight: 900; margin: 0; }

        /* 摘要面板 */
        .summary-panel {
            background: rgba(255, 255, 255, 0.6); border: 1.5px solid var(--yung-gold);
            padding: 25px 30px; margin-bottom: 35px; border-radius: 20px;
        }
        .summary-title { font-size: 24px; font-weight: 900; color: var(--yung-green); margin-bottom: 12px; display: block; }
        .summary-line { font-size: 19px; color: #444; font-weight: 600; line-height: 2.2; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 8px; }
        .summary-line b { color: #000; font-size: 21px; margin: 0 4px; font-weight: 900; }

        /* 表格區 */
        .report-content { flex-grow: 1; position: relative; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 15px; position: relative; z-index: 1; table-layout: fixed; }
        th { font-size: 15px; color: #1d1d1f; font-weight: 800; padding: 10px 5px; text-align: center; border-bottom: 2px solid var(--yung-gold); vertical-align: top; }
        .th-sub { font-size: 11px; color: var(--text-gray); font-weight: 500; display: block; margin-top: 4px; }
        
        td { padding: 20px 5px; text-align: center; vertical-align: middle; border-bottom: 1.5px solid rgba(0,0,0,0.04); background: transparent !important; }
        
        /* 核心數值字體 - 💡 巅峰清晰度 */
        .col-price { font-size: 28px; color: #1c3d73; font-weight: 900; }
        .col-net { font-size: 34px; color: var(--yung-red); font-weight: 900; }
        .col-main-data { font-size: 21px; color: #1d1d1f; font-weight: 800; }
        .data-note { font-size: 12px; color: var(--text-gray); display: block; margin-top: 5px; white-space: nowrap; } /* 💡 防止換行跑位 */

        .tag-pill {
            display: inline-block; font-size: 11px; font-weight: 800;
            background: rgba(0, 140, 74, 0.1); color: var(--yung-green);
            padding: 2px 8px; border-radius: 6px; margin-top: 4px;
        }

        /* 頁腳修正 - 💡 解決跑位問題 */
        .footer { 
            margin-top: 40px; padding-top: 30px; border-top: 2px solid var(--yung-gold);
            display: flex; justify-content: space-between; align-items: flex-end; width: 100%;
        }
        .footer-left { flex: 1; text-align: left; }
        .footer-left strong { font-size: 22px; color: #000; display: block; margin-bottom: 8px; font-weight: 900; white-space: nowrap; }
        .footer-left span { font-size: 16px; color: var(--text-gray); font-weight: 600; white-space: nowrap; }

        .footer-right { text-align: right; color: var(--text-gray); font-size: 13px; line-height: 1.8; }
        .watermark { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 85%; opacity: 0.08; pointer-events: none; z-index: 0; }

        @media (max-width: 800px) {
            .ui-controls { width: 95%; }
            #output-container { transform: scale(0.42); transform-origin: top center; margin-bottom: -650px; }
        }
    </style>
</head>
<body>

<div class="ui-controls">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">重新計算</button>
        <button class="btn-share" onclick="handleMobileShare()">手機儲存相片</button>
        <button class="btn-pc" onclick="handlePCDownload()">電腦儲存相片</button>
    </div>

    <div class="control-panel">
        <div class="input-group"><label>買入總價 (萬)</label><input type="number" id="costPrice" value="886" oninput="generateTable()"></div>
        <div class="input-group"><label>列舉裝潢 (萬)</label><input type="number" id="renoCost" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買方仲介費 (萬)</label><input type="number" id="buyAg" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買入規費 (萬)</label><input type="number" id="buyFe" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>基準成交預估 (萬)</label><input type="number" id="basePrice" value="1500" oninput="generateTable()"></div>
        <div class="input-group">
            <label>顯示筆數 / 級距</label>
            <div style="display:flex; gap:8px;">
                <input type="number" id="rowCount" value="6" oninput="generateTable()" style="flex:1;">
                <select id="stepValue" onchange="generateTable()" style="flex:1;"><option value="5">5萬</option><option value="10" selected>10萬</option></select>
            </div>
        </div>
        <div class="input-group">
            <label>賣方服務費</label>
            <div style="display:flex; gap:8px;">
                <select id="feeType" onchange="generateTable()" style="flex:0.8;"><option value="percent">%</option><option value="fixed">萬</option></select>
                <input type="number" id="agencyVal" value="4" oninput="generateTable()" style="flex:1.2;">
            </div>
        </div>
        <div class="input-group">
            <label>房地合一稅率</label>
            <select id="taxRate" onchange="generateTable()">
                <option value="45">45% (持有 2 年內)</option>
                <option value="35">35% (持有 2-5 年)</option>
                <option value="20" selected>20% (持有超過 5 年)</option>
                <option value="10">設籍且自住滿 6 年 (400 萬免稅額) 10%</option>
            </select>
        </div>
    </div>
</div>

<div id="output-container">
    <div class="report-header">
        <img src="logo.png" class="brand-logo-img" alt="LOGO">
        <h1 class="report-title">成屋獲利對照報告</h1>
    </div>

    <div class="summary-panel">
        <span class="summary-title">報告設定條件：</span>
        <div class="summary-line" id="sumLine1">取得：買入 <b>886</b> | 裝潢 <b>0</b> | 買仲 <b>0</b> | 規費 <b>0</b></div>
        <div class="summary-line" id="sumLine2">稅務：稅率 <b>20%</b> | 賣仲費 <b>4%</b> | 賣出規費 <b>0</b></div>
    </div>

    <div class="report-content">
        <img src="logo浮水印.png" class="watermark" alt="浮水印" onerror="this.style.display='none'">
        <table>
            <thead>
                <tr>
                    <th style="width:20%">成交價<br><span class="th-sub">(預估成交)</span></th>
                    <th style="width:16%">服務費<br><span class="th-sub">(賣出成本)</span></th>
                    <th style="width:23%">課稅所得<br><span class="th-sub">(成交-成本-抵扣)</span></th>
                    <th style="width:21%">房地稅額<br><span class="th-sub">(所得×稅率)</span></th>
                    <th style="width:20%">最終淨獲利<br><span class="th-sub">(結案實拿)</span></th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            <span>雲林縣斗六市成功二街126號</span>
        </div>
        <div class="footer-right">
            製表日期：<span id="dateDisplay"></span><br>
            實際稅額以國稅局核定為準。
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renoCost').value) || 0;
        const buyAg = parseFloat(document.getElementById('buyAg').value) || 0;
        const buyFe = parseFloat(document.getElementById('buyFe').value) || 0;
        const base = parseFloat(document.getElementById('basePrice').value) || 1500;
        const feeType = document.getElementById('feeType').value;
        const agencyVal = parseFloat(document.getElementById('agencyVal').value) || 0;
        const taxRateSelect = document.getElementById('taxRate');
        const taxVal = parseFloat(taxRateSelect.value);
        const taxText = taxRateSelect.options[taxRateSelect.selectedIndex].text;
        const step = parseFloat(document.getElementById('stepValue').value) || 10;
        const rows = parseInt(document.getElementById('rowCount').value) || 6;

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();
        document.getElementById('sumLine1').innerHTML = `取得：買入 <b>${cost}</b> | 裝潢 <b>${reno}</b> | 買仲 <b>${buyAg}</b> | 規費 <b>${buyFe}</b>`;
        const feeDisplay = (feeType === 'percent') ? `${agencyVal}%` : `${agencyVal}萬`;
        document.getElementById('sumLine2').innerHTML = `稅務：稅率 <b>${taxText.split(' ')[0]}</b> | 賣仲費 <b>${feeDisplay}</b> | 賣出規費 <b>0</b>`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        for(let i=0; i < rows; i++) {
            let price = base - (i * step);
            let sellAgency = (feeType === 'percent') ? (price * (agencyVal / 100)) : agencyVal;
            let deduc = Math.max(sellAgency, Math.min(price * 0.03, 30));
            let totalAcq = cost + reno + buyAg + buyFe;
            let rawProfit = price - totalAcq - deduc;
            
            const profitNoteLabel = deduc === sellAgency ? '[採仲介費]' : '[採免稅額]';
            let tax = (taxVal === 10) ? Math.max(0, rawProfit - 400) * 0.1 : Math.max(0, rawProfit) * (taxVal / 100);
            let net = price - totalAcq - sellAgency - tax;

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td class="col-main-data">${sellAgency.toFixed(1)}</td>
                <td>
                    <span class="col-main-data">${rawProfit.toFixed(1)}</span>
                    <span class="data-note">(抵扣 ${deduc.toFixed(1)} ${profitNoteLabel})</span>
                </td>
                <td>
                    <span class="col-main-data">${tax.toFixed(1)}</span>
                    <span class="data-note">(稅率 ${taxText.split('%')[0]}%)</span>
                </td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    async function captureAndProcess() {
        const target = document.getElementById('output-container');
        const canvas = await html2canvas(target, { 
            scale: 3, 
            useCORS: true, 
            backgroundColor: null, // 💡 讓背景透明，透出我們的琥珀金
            width: 800,
            height: target.offsetHeight,
            windowHeight: target.offsetHeight,
            onclone: (clonedDoc) => {
                const el = clonedDoc.getElementById('output-container');
                el.style.transform = 'none';
                el.style.margin = '0';
                el.style.borderRadius = '0'; // 擷取時不留圓角空白
            }
        });
        return canvas;
    }

    async function handleMobileShare() {
        const canvas = await captureAndProcess();
        canvas.toBlob(async (blob) => {
            const file = new File([blob], '獲利報告.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '獲利試算' });
            }
        });
    }

    async function handlePCDownload() {
        const canvas = await captureAndProcess();
        const a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = '獲利報告.png'; a.click();
    }
    window.onload = generateTable;
</script>
</body>
</html>
