<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成屋獲利對照報告 - 永義房屋</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --premium-blue: #1e3a8a;
            --brand-gray: #595757;
            --border-color: #cccccc;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: #f4f7f6; color: var(--brand-gray);
            padding: 0; margin: 0; width: 100%;
        }

        .app-container { 
            width: 95%; max-width: 1050px; margin: 15px auto; 
            background: #fff; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); box-sizing: border-box;
        }

        /* 按鈕區 */
        .btn-group { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-group button { 
            border: none; padding: 18px; border-radius: 12px; cursor: pointer; 
            font-size: 20px; font-weight: 900; flex: 1; color: white; transition: 0.3s;
        }
        .btn-calc { background: var(--yung-green); }
        .btn-save { background: var(--yung-red); }

        .report-branding { 
            text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--yung-red); 
            padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; 
        }
        .brand-logo-img { height: 50px; }
        .report-main-title { color: var(--yung-green); font-size: 26px; font-weight: bold; margin: 0; }

        /* 輸入區：手機一列一列 */
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: 900; margin-bottom: 8px; font-size: 18px; color: #444; }
        
        .fee-input-wrapper { display: flex; border: 2px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .fee-input-wrapper select { width: 70px; border: none; background: #eee; font-size: 16px; font-weight: bold; padding: 5px; }
        .fee-input-wrapper input { border: none; flex: 1; font-size: 20px; padding: 10px; font-weight: bold; color: #1e3a8a; }

        input, select { padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 20px; font-weight: bold; color: #1e3a8a; width: 100%; box-sizing: border-box; }

        /* --- 報表區與表格 --- */
        .report-area { 
            border-top: 6px solid #fdb913; padding-top: 20px; 
            position: relative; overflow: hidden; /* 防止溢出 */
        }

        /* 浮水印 */
        .watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; opacity: 0.08; pointer-events: none; z-index: 0;
        }

        table { width: 100%; border-collapse: collapse; position: relative; z-index: 1; table-layout: fixed; }
        th { background: rgba(248, 250, 252, 0.9); font-size: 16px; padding: 10px 2px; border-bottom: 2px solid #a0aec0; word-break: break-all; }
        td { font-size: 22px; font-weight: bold; padding: 15px 2px; text-align: center; border-bottom: 1px solid #eee; }

        /* 手機版表格縮放優化：一目了然不滑動 */
        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
            .report-branding { flex-direction: column; gap: 10px; }
            
            /* 縮小文字，讓表格硬擠進手機寬度 */
            th { font-size: 12px; padding: 8px 1px; }
            td { font-size: 15px; padding: 10px 1px; }
            .report-main-title { font-size: 22px; }
        }

        /* 儲存圖片時強制回歸寬版大字體 */
        .exporting { width: 1050px !important; }
        .exporting .control-panel, .exporting .btn-group { display: none; }
        .exporting th { font-size: 18px !important; padding: 15px !important; }
        .exporting td { font-size: 24px !important; padding: 20px !important; }
        #exportSummary { display: none; margin-bottom: 15px; font-size: 20px; padding: 15px; border-left: 6px solid var(--yung-green); background: #f9f9f9; }
        .exporting #exportSummary { display: block; }

        /* 頁腳 */
        .footer-info { margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-end; color: #7f8c8d; font-size: 13px; }
        .footer-left strong { font-size: 16px; color: #2c3e50; display: block; }
        .footer-right { text-align: right; }

        #toast { visibility: hidden; min-width: 200px; background: var(--yung-green); color: white; text-align: center; border-radius: 50px; padding: 12px; position: fixed; left: 50%; transform: translateX(-50%); bottom: 30px; z-index: 1000; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

<div id="toast">✅ 報表處理完成</div>

<div class="app-container" id="main-app">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算</button>
        <button class="btn-save" id="btnSave" onclick="saveAsImage()">📤 儲存報表圖檔</button>
    </div>

    <div class="report-branding">
        <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
        <h1 class="report-main-title">成屋獲利對照報告</h1>
    </div>

    <div class="control-panel">
        <div class="input-grid">
            <div class="input-group"><label>買入總價 (萬)</label><input type="number" id="costPrice" value="1000"></div>
            <div class="input-group"><label>裝潢成本 (萬)</label><input type="number" id="renoCost" value="50"></div>
            <div class="input-group"><label>買入稅費 (萬)</label><input type="number" id="buyFees" value="20"></div>
            <div class="input-group">
                <label>賣方服務費</label>
                <div class="fee-input-wrapper">
                    <select id="feeType" onchange="generateTable()"><option value="percent">%</option><option value="fixed">萬</option></select>
                    <input type="number" id="agencyVal" value="4" oninput="generateTable()">
                </div>
            </div>
            <div class="input-group">
                <label>房地合一稅率</label>
                <select id="taxRate">
                    <option value="45">45%</option>
                    <option value="35" selected>35%</option>
                    <option value="20">20%</option>
                </select>
            </div>
            <div class="input-group"><label>基準成交價 (萬)</label><input type="number" id="basePrice" value="1500"></div>
        </div>
    </div>

    <div id="exportSummary"></div>

    <div class="report-area">
        <img src="logo.png" class="watermark" alt="浮水印" onerror="this.style.display='none'">
        <table>
            <thead>
                <tr>
                    <th style="width:18%">成交價</th>
                    <th style="width:16%">服務費</th>
                    <th style="width:16%">抵扣額</th>
                    <th style="width:16%">所得</th>
                    <th style="width:16%">合一稅</th>
                    <th style="width:18%">淨獲利</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer-info">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            承峰不動產仲介有限公司 | 雲林縣斗六市成功二街126號
        </div>
        <div class="footer-right">
            製表時間：<span id="dateDisplay"></span>
            <div style="font-size:10px; color:#bdc3c7;">免責聲明：實際稅額以國稅局核定為準。</div>
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renoCost').value) || 0;
        const buyFees = parseFloat(document.getElementById('buyFees').value) || 0;
        const totalAcq = cost + reno + buyFees;
        const feeType = document.getElementById('feeType').value;
        const agencyVal = parseFloat(document.getElementById('agencyVal').value) || 0;
        const taxRate = parseFloat(document.getElementById('taxRate').value) / 100;
        const base = parseFloat(document.getElementById('basePrice').value) || 0;

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();
        document.getElementById('exportSummary').innerHTML = `設定：買入 ${cost}萬 | 稅率 ${(taxRate*100)}% | 服務費 ${agencyVal}${feeType==='percent'?'%':'萬'}`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        for(let i=0; i<8; i++) {
            let price = base - (i * 20);
            let sellAgency = (feeType === 'percent') ? (price * (agencyVal / 100)) : agencyVal;
            let deduc = Math.max(sellAgency, Math.min(price * 0.03, 30));
            let taxBase = Math.max(0, price - totalAcq - deduc);
            let tax = taxBase * taxRate;
            let net = price - totalAcq - sellAgency - tax;

            let tr = document.createElement('tr');
            if(i===0) tr.style.backgroundColor = "rgba(255, 244, 179, 0.7)";
            tr.innerHTML = `<td>${price}</td><td>${sellAgency.toFixed(1)}</td><td>${deduc.toFixed(1)}</td><td>${taxBase.toFixed(1)}</td><td>${tax.toFixed(1)}</td><td style="color:var(--yung-red)">${net.toFixed(1)}</td>`;
            tbody.appendChild(tr);
        }
    }

    async function saveAsImage() {
        const app = document.getElementById('main-app');
        const btn = document.getElementById('btnSave');
        btn.innerText = "⏳ 處理中...";
        app.classList.add('exporting');
        const canvas = await html2canvas(app, { scale: 2, useCORS: true, width: 1050 });
        app.classList.remove('exporting');
        btn.innerText = "📤 儲存報表圖檔";
        canvas.toBlob(async (blob) => {
            const file = new File([blob], '報告.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '獲利報告' });
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = '報告.png'; a.click();
            }
            const t = document.getElementById("toast");
            t.className = "show"; setTimeout(()=>t.className="", 3000);
        });
    }
    window.onload = generateTable;
</script>
</body>
</html>
