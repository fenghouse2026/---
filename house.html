<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成屋獲利對照報告 - 永義房屋</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --premium-blue: #1e3a8a;
            --brand-gray: #595757;
            --border-color: #cccccc;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: #f4f7f6; color: var(--brand-gray);
            padding: 0; margin: 0;
            width: 100%;
        }

        .app-container { 
            width: 95%; 
            max-width: 1050px; 
            margin: 20px auto; 
            background: #fff; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            box-sizing: border-box;
        }

        /* 按鈕區 */
        .btn-group { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 30px; }
        .btn-group button { 
            border: none; padding: 20px; border-radius: 12px; cursor: pointer; 
            font-size: 22px; font-weight: 900; flex: 1; color: white; transition: 0.3s;
        }
        .btn-calc { background: var(--yung-green); box-shadow: 0 4px 10px rgba(0,140,74,0.3); }
        .btn-save { background: var(--yung-red); box-shadow: 0 4px 10px rgba(216,42,41,0.3); }

        /* 標題與 Logo */
        .report-branding { 
            text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--yung-red); 
            padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; 
        }
        .brand-logo-img { height: 65px; }
        .report-main-title { color: var(--yung-green); font-size: 32px; font-weight: bold; margin: 0; }

        /* 設定區核心排版 */
        .control-panel { background: #fdfdfd; padding: 25px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 25px; }
        .control-panel h2 { text-align: center; font-size: 28px; border-bottom: 2px dashed #ccc; padding-bottom: 15px; margin-top: 0; font-weight: 900; }
        
        /* 預設兩欄，手機會變一欄 */
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: 900; margin-bottom: 10px; font-size: 20px; color: #444; }

        /* 複合式輸入框 (% 或 萬) */
        .fee-input-wrapper {
            display: flex; border: 2px solid var(--border-color); border-radius: 8px; overflow: hidden; background: #fff;
        }
        .fee-input-wrapper select {
            width: 100px; border: none; background: #f0f0f0; border-right: 2px solid var(--border-color);
            font-size: 18px; font-weight: bold; cursor: pointer; padding: 10px; border-radius: 0;
        }
        .fee-input-wrapper input { border: none; flex: 1; border-radius: 0; }

        input, select { 
            padding: 15px; border: 2px solid var(--border-color); border-radius: 8px; 
            font-size: 24px; font-weight: bold; color: #1e3a8a; width: 100%; box-sizing: border-box;
        }

        /* 報表表格 */
        .report-area { overflow-x: auto; border-top: 8px solid #fdb913; padding-top: 25px; position: relative; }
        table { width: 100%; min-width: 900px; border-collapse: collapse; }
        th { background: #f8fafc; font-size: 18px; padding: 15px 5px; border-bottom: 2px solid #a0aec0; }
        td { font-size: 24px; font-weight: bold; padding: 18px 5px; text-align: center; border-bottom: 1px solid #eee; }
        .highlight-row td { background-color: #fff4b3 !important; }
        .col-net { color: var(--yung-red); }

        /* 手機版專屬 (Media Query) */
        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; } /* 關鍵：變成單欄一列 */
            .btn-group { flex-direction: column; }
            .report-branding { flex-direction: column; gap: 10px; }
            .report-main-title { font-size: 26px; }
            .brand-logo-img { height: 55px; }
        }

        /* 圖片匯出專用樣式 */
        .exporting { width: 1050px !important; }
        .exporting .control-panel, .exporting .btn-group { display: none; }
        #exportSummary { display: none; margin-bottom: 20px; font-size: 22px; line-height: 1.6; background: #f9f9f9; padding: 20px; border-left: 6px solid var(--yung-green); }
        .exporting #exportSummary { display: block; }

        /* Toast 提示 */
        #toast {
            visibility: hidden; min-width: 280px; background: var(--yung-green); color: white;
            text-align: center; border-radius: 50px; padding: 20px; position: fixed;
            left: 50%; transform: translateX(-50%); bottom: 30px; font-size: 20px; z-index: 1000;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; opacity: 1; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    </style>
</head>
<body>

<div id="toast">✅ 報表處理成功！</div>

<div class="app-container" id="main-app">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算</button>
        <button class="btn-save" id="btnSave" onclick="saveAsImage()">📤 分享/儲存報表</button>
    </div>

    <div class="report-branding">
        <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
        <h1 class="report-main-title">成屋獲利對照報告</h1>
    </div>

    <div class="control-panel">
        <h2>一、成屋專屬參數設定</h2>
        <div class="input-grid">
            <div class="input-group">
                <label>買入總價 (萬元)</label>
                <input type="number" id="costPrice" value="1000">
            </div>
            <div class="input-group">
                <label>可列舉裝潢成本 (萬元)</label>
                <input type="number" id="renoCost" value="50">
            </div>
            <div class="input-group">
                <label>購買仲介費+規費 (萬元)</label>
                <input type="number" id="buyFees" value="30">
            </div>
            <div class="input-group">
                <label>賣方服務費 (切換%或萬)</label>
                <div class="fee-input-wrapper">
                    <select id="feeType" onchange="generateTable()">
                        <option value="percent">%</option>
                        <option value="fixed">萬</option>
                    </select>
                    <input type="number" id="agencyVal" value="4" step="0.1" oninput="generateTable()">
                </div>
            </div>
            <div class="input-group">
                <label>房地合一稅率 (%)</label>
                <select id="taxRate">
                    <option value="45">45% (持有2年內)</option>
                    <option value="35" selected>35% (持有2-5年)</option>
                    <option value="20">20% (持有5-10年)</option>
                </select>
            </div>
            <div class="input-group">
                <label>基準成交價 (萬元)</label>
                <input type="number" id="basePrice" value="1500">
            </div>
        </div>
    </div>

    <div id="exportSummary"></div>

    <div class="report-area">
        <table>
            <thead>
                <tr>
                    <th>成交價</th>
                    <th>實付仲介費</th>
                    <th>抵扣費用</th>
                    <th>課稅所得</th>
                    <th>房地合一稅</th>
                    <th>淨獲利</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div style="margin-top:25px; display:flex; justify-content:space-between; color:#888;">
        <div><strong>永義房屋斗六成功莊敬加盟店</strong></div>
        <div id="dateDisplay"></div>
    </div>
</div>

<script>
    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renoCost').value) || 0;
        const buyFees = parseFloat(document.getElementById('buyFees').value) || 0;
        const totalAcq = cost + reno + buyFees;

        const feeType = document.getElementById('feeType').value;
        const agencyVal = parseFloat(document.getElementById('agencyVal').value) || 0;
        const taxRate = parseFloat(document.getElementById('taxRate').value) / 100;
        const base = parseFloat(document.getElementById('basePrice').value) || 0;

        document.getElementById('dateDisplay').innerText = "製表日期：" + new Date().toLocaleDateString();
        document.getElementById('exportSummary').innerHTML = 
            `<strong>設定條件：</strong> 買入 ${cost}萬 | 裝潢 ${reno}萬 | 稅率 ${(taxRate*100)}% | ` +
            `服務費 ${agencyVal}${feeType==='percent'?'%':'萬'}`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        for(let i=0; i<8; i++) {
            let price = base - (i * 20);
            
            // 計算賣方服務費邏輯
            let sellAgency = (feeType === 'percent') ? (price * (agencyVal / 100)) : agencyVal;
            
            let deduc = Math.max(sellAgency, Math.min(price * 0.03, 30));
            let taxBase = Math.max(0, price - totalAcq - deduc);
            let tax = taxBase * taxRate;
            let net = price - totalAcq - sellAgency - tax;

            let tr = document.createElement('tr');
            if(i===0) tr.className = 'highlight-row';
            tr.innerHTML = `
                <td>${price}</td>
                <td>${sellAgency.toFixed(1)}</td>
                <td>${deduc.toFixed(1)}</td>
                <td>${taxBase.toFixed(1)}</td>
                <td>${tax.toFixed(1)}</td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    async function saveAsImage() {
        const app = document.getElementById('main-app');
        const btn = document.getElementById('btnSave');
        const isMobile = window.innerWidth < 768;

        btn.innerText = "⏳ 處理中...";
        if(isMobile) app.style.width = "1050px"; // 擷取時強制加寬確保美觀
        app.classList.add('exporting');

        const canvas = await html2canvas(app, { scale: 2, useCORS: true });
        
        app.classList.remove('exporting');
        if(isMobile) app.style.width = "";
        btn.innerText = "📤 分享/儲存報表";

        canvas.toBlob(async (blob) => {
            const file = new File([blob], '獲利報告.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '成屋獲利報告' });
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = '報告.png'; a.click();
            }
            const t = document.getElementById("toast");
            t.className = "show"; setTimeout(()=>t.className="", 3000);
        });
    }

    window.onload = generateTable;
</script>

</body>
</html>
