<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成屋獲利對照報告 - 永義房屋斗六成功莊敬加盟店</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-yellow: #fdb913; 
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --text-main: #1e293b;
            --text-sub: #475569;
            --premium-blue: #1e3a8a; 
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #f8fafc; color: var(--text-main);
            padding: 20px 10px; margin: 0; min-height: 100vh;
        }

        .app-container { max-width: 950px; margin: auto; }
        
        .btn-group { display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; }
        button {
            border: none; padding: 14px 20px; border-radius: 50px; cursor: pointer;
            font-size: 15px; font-weight: 700; transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; max-width: 250px;
        }
        .btn-calc { background: var(--yung-green); color: white; }
        .btn-save { background: var(--yung-red); color: white; }

        #full-report-area {
            background: #ffffff; padding: 50px 40px; border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); position: relative; overflow: hidden;
        }
        #full-report-area::before {
            content: ""; position: absolute; top: 0; left: 0; width: 8px; height: 100%;
            background: linear-gradient(to bottom, var(--yung-yellow), var(--yung-green));
        }

        .report-branding { text-align: center; margin-bottom: 35px; }
        .brand-logo-img { height: 75px; margin-bottom: 12px; }
        .report-main-title { color: var(--premium-blue); font-size: 32px; font-weight: 900; letter-spacing: 3px; margin: 0; }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px 25px; align-items: flex-end; }
        .input-group label { font-weight: 700; font-size: 13px; color: var(--text-sub); margin-bottom: 4px; display: block; }
        input, select {
            background: transparent; border: none; border-bottom: 2px solid var(--border-color);
            padding: 6px 0; height: 36px; font-size: 17px; font-weight: 700; width: 100%; color: var(--text-main); outline: none;
        }

        /* 摘要區樣式 */
        #textSummary {
            background: #fafafa; border-radius: 12px; padding: 25px;
            font-size: 16px; line-height: 1.8; margin-bottom: 25px; display: none; border: 1px solid #eee;
        }

        /* 💡 桌面版表格樣式 💡 */
        .desktop-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; table-layout: fixed; margin-top: 20px; }
        .desktop-table th { 
            color: var(--text-main); font-size: 15px; font-weight: 800; padding: 15px 5px; 
            text-align: center; border-bottom: 3px solid #f1f5f9; vertical-align: top;
        }
        .th-note { display: block; font-size: 10px; font-weight: 500; color: #94a3b8; margin-top: 5px; line-height: 1.3; }
        .desktop-table td { 
            padding: 20px 5px; text-align: center; background: #fff;
            border-top: 1px solid #f8fafc; border-bottom: 1px solid #f8fafc;
            font-size: 20px; font-weight: 700;
        }
        .desktop-table tr td:first-child { border-left: 1px solid #f8fafc; border-radius: 12px 0 0 12px; }
        .desktop-table tr td:last-child { border-right: 1px solid #f8fafc; border-radius: 0 12px 12px 0; }

        .col-price { color: var(--premium-blue); font-size: 26px !important; font-weight: 950; }
        .col-net { color: var(--yung-red); font-size: 26px !important; font-weight: 950; }
        .highlight-row td { background: #fffbeb !important; border-color: #fef3c7 !important; }

        /* 🔥 手機版：卡片佈局（不硬擠，字體超大） 🔥 */
        .mobile-cards { display: none; flex-direction: column; gap: 20px; margin-top: 20px; }
        .card {
            background: white; border-radius: 20px; padding: 25px;
            border: 1px solid #edf2f7; box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            position: relative; overflow: hidden;
        }
        .card::before { content: ""; position: absolute; left: 0; top: 0; width: 8px; height: 100%; background: #e2e8f0; }
        .card.highlight::before { background: var(--yung-yellow); }
        .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 15px; border-bottom: 1px dashed #eee; padding-bottom: 12px; }
        .card-price-main { font-size: 32px; font-weight: 950; color: var(--premium-blue); }
        .card-net-main { font-size: 32px; font-weight: 950; color: var(--yung-red); }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card-item { font-size: 14px; color: var(--text-sub); font-weight: 800; }
        .card-val { display: block; font-size: 22px; color: var(--text-main); font-weight: 850; margin-top: 4px; }
        .method-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; margin-top: 5px; }
        .badge-agency { background: #e6f4ea; color: var(--yung-green); border: 1px solid var(--yung-green); }
        .badge-tax { background: #fff8e1; color: #b45309; border: 1px solid var(--yung-yellow); }

        /* 匯出模式強制回歸 A4 橫式 */
        .export-mode { width: 1050px !important; padding: 60px 80px !important; border-radius: 0 !important; }
        .export-mode .mobile-cards { display: none !important; }
        .export-mode .desktop-table { display: table !important; }
        .export-mode .control-panel { display: none !important; }
        .export-mode #textSummary { display: block !important; visibility: visible !important; opacity: 1 !important; }

        .footer-info {
            margin-top: 40px; padding-top: 25px; border-top: 1px solid #f1f5f9;
            display: flex; justify-content: space-between; align-items: flex-end;
            font-size: 13px; color: var(--text-sub); line-height: 1.8;
        }

        @media (max-width: 600px) {
            #full-report-area:not(.export-mode) { padding: 30px 15px; }
            #full-report-area:not(.export-mode) .desktop-table { display: none; }
            #full-report-area:not(.export-mode) .mobile-cards { display: flex; }
            .report-main-title { font-size: 26px; }
            .btn-group { flex-direction: column; }
            button { max-width: none; width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算數據</button>
        <button class="btn-save" onclick="saveAsImage()">📸 儲存 A4 質感報表</button>
    </div>

    <div id="full-report-area">
        <div class="report-branding">
            <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
            <h1 class="report-main-title">成屋獲利對照報告</h1>
        </div>

        <div class="control-panel">
            <div class="input-section">
                <div class="section-title">1. 取得成本設定</div>
                <div class="input-grid">
                    <div class="input-group"><label>買入總價</label><input type="number" id="costPrice" value="886"></div>
                    <div class="input-group"><label>可認列裝潢(需發票)</label><input type="number" id="renovationCost" value="0"></div>
                    <div class="input-group"><label>買方服務費</label><input type="number" id="buyAgencyFee" value="0"></div>
                    <div class="input-group"><label>買入時規費</label><input type="number" id="buyOtherFees" value="0"></div>
                </div>
            </div>
            <div class="input-section">
                <div class="section-title">2. 銷售稅務設定</div>
                <div class="input-grid">
                    <div class="input-group">
                        <label>房地合一稅率</label>
                        <select id="taxRate">
                            <option value="45" selected>45% (持有2年內)</option>
                            <option value="35">35% (持有2-5年)</option>
                            <option value="20">20% (持有5-10年)</option>
                            <option value="10">10% (自用優惠)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>賣方服務費</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="agencyFeeType" style="flex: 1;"><option value="percent">%</option><option value="fixed">金額</option></select>
                            <input type="number" id="agencyRate" value="4" style="flex: 1.2;">
                        </div>
                    </div>
                    <div class="input-group"><label>賣出時規費</label><input type="number" id="otherSellingFees" value="0"></div>
                </div>
            </div>
            <div class="input-section" style="margin-bottom:0;">
                <div class="section-title">3. 成交金額對照</div>
                <div class="input-grid">
                    <div class="input-group"><label>基準價</label><input type="number" id="basePrice" value="1500"></div>
                    <div class="input-group"><label>級距</label><select id="stepValue"><option value="1">1萬</option><option value="5">5萬</option><option value="10" selected>10萬</option></select></div>
                    <div class="input-group"><label>顯示筆數</label><input type="number" id="rowCount" value="6"></div>
                </div>
            </div>
        </div>

        <div id="textSummary"></div>

        <div class="capture-area">
            <div style="text-align:center; margin-bottom:30px;">
                <div style="font-size:13px; color:var(--premium-blue); background:#f8fafc; border:2px solid #e2e8f0; display:inline-block; padding:8px 30px; border-radius:50px; font-weight:800;">
                    💡 系統自動擇優認列抵扣 (實付仲介費 vs 免稅額3%最高30萬)
                </div>
            </div>
            
            <table class="desktop-table" id="desktopTable">
                <thead>
                    <tr>
                        <th style="width:17%;">成交價</th>
                        <th style="width:17%;">實付費用<span class="th-note">(仲介費+規費)</span></th>
                        <th style="width:17%;">抵扣費用<span class="th-note">(採最優認列)</span></th>
                        <th style="width:17%;">房地稅額<span class="th-note">(所得×稅率)</span></th>
                        <th style="width:18%;">淨獲利<span class="th-note">(賣價-成本-稅費)</span></th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>

            <div class="mobile-cards" id="mobileCards"></div>
            
            <div class="footer-info">
                <div>
                    <strong style="color:var(--premium-blue); font-size: 16px;">永義房屋斗六成功莊敬加盟店</strong><br>
                    <span>承峰不動產仲介有限公司 | 斗六市成功二街126號</span>
                </div>
                <div style="text-align: right;">
                    製表時間：<span id="dateDisplay"></span><br>
                    實際稅額以國稅局核定為準
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renovationCost').value) || 0;
        const buyAgency = parseFloat(document.getElementById('buyAgencyFee').value) || 0;
        const buyOther = parseFloat(document.getElementById('buyOtherFees').value) || 0;
        const taxRateVal = document.getElementById('taxRate').value;
        const taxRateText = document.getElementById('taxRate').options[document.getElementById('taxRate').selectedIndex].text;
        const taxRate = parseFloat(taxRateVal) / 100;
        const agencyFeeType = document.getElementById('agencyFeeType').value;
        const agencyRate = parseFloat(document.getElementById('agencyRate').value) || 0;
        const otherSellFee = parseFloat(document.getElementById('otherSellingFees').value) || 0;
        const basePrice = parseFloat(document.getElementById('basePrice').value) || 0;
        const stepValue = parseFloat(document.getElementById('stepValue').value) || 0;
        const rowCount = parseInt(document.getElementById('rowCount').value) || 6;

        // 同步摘要
        const acquisitionTotal = costPrice + reno + buyAgency + buyOther;
        document.getElementById('textSummary').innerHTML = `
            <div style="font-size: 20px; color: var(--yung-green); font-weight: 950; margin-bottom: 10px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px;">報告設定條件：</div>
            取得成本：買入 ${costPrice} | 裝潢 ${reno} | 買仲費 ${buyAgency} | 買入規費 ${buyOther} (總計 ${acquisitionTotal.toFixed(1)})<br>
            稅務設定：稅率 ${taxRateText} | 賣仲費 ${agencyRate}${agencyFeeType==='percent'?'%':'金額'} | 賣出規費 ${otherSellFee}
        `;

        const today = new Date();
        document.getElementById('dateDisplay').innerText = `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;

        const tbody = document.getElementById('resultBody');
        const mCards = document.getElementById('mobileCards');
        tbody.innerHTML = ''; mCards.innerHTML = '';

        for(let i = 0; i >= -rowCount + 1; i--) {
            let currentPrice = basePrice + (i * stepValue);
            let sellAgencyCalc = (agencyFeeType === 'percent') ? (currentPrice * agencyRate / 100) : agencyRate;
            let actualSellingExp = sellAgencyCalc + otherSellFee;
            let statExp = Math.min(currentPrice * 0.03, 30);
            let isAgencyBetter = actualSellingExp >= statExp;
            let deducExp = Math.max(actualSellingExp, statExp);
            let taxBase = Math.max(0, currentPrice - acquisitionTotal - deducExp);
            if (taxRateVal === '10') taxBase = Math.max(0, taxBase - 400);
            let tax = taxBase * taxRate;
            let netProfit = currentPrice - acquisitionTotal - actualSellingExp - tax;

            // 桌面表格
            let tr = document.createElement('tr');
            if(i===0) tr.className='highlight-row';
            tr.innerHTML = `
                <td class="col-price">${currentPrice}</td>
                <td>${actualSellingExp.toFixed(1)}</td>
                <td>${deducExp.toFixed(1)}<br><small style="font-size:10px; color:var(--yung-green)">${isAgencyBetter?'[採仲介費]':'[採免稅額]'}</small></td>
                <td>${tax.toFixed(1)}<br><small style="font-size:10px; color:#94a3b8">(房地合一稅 ${taxRateVal}%)</small></td>
                <td class="col-net">${netProfit.toFixed(1)}</td>`;
            tbody.appendChild(tr);

            // 手機卡片：大字、有註記、不擠壓
            let card = document.createElement('div');
            card.className = `card ${i===0?'highlight':''}`;
            card.innerHTML = `
                <div class="card-header">
                    <div><span class="card-title">成交金額</span><div class="card-price-main">${currentPrice}</div></div>
                    <div style="text-align:right"><span class="card-title">預計淨獲利</span><div class="card-net-main">${netProfit.toFixed(1)}</div></div>
                </div>
                <div class="card-grid">
                    <div class="card-item">政府抵扣額<span class="card-val">${deducExp.toFixed(1)}</span><span class="method-badge ${isAgencyBetter?'badge-agency':'badge-tax'}">${isAgencyBetter?'仲介費方案':'免稅額方案'}</span></div>
                    <div class="card-item">房地合一稅<span class="card-val">${tax.toFixed(1)}</span><span class="card-note">(房地合一稅 ${taxRateVal}%)</span></div>
                    <div class="card-item" style="grid-column: span 2; border-top: 1px solid #f1f5f9; padding-top:10px;">
                        <span class="card-title" style="color:var(--yung-green)">💡 計算方式註記</span>
                        <span class="card-note">獲利 = 賣價 - 總取得成本(${acquisitionTotal.toFixed(1)}) - 實付服務費 - 應繳稅金</span>
                    </div>
                </div>`;
            mCards.appendChild(card);
        }
    }

    function saveAsImage() {
        generateTable();
        const area = document.getElementById('full-report-area');
        area.classList.add('export-mode');
        setTimeout(() => {
            html2canvas(area, { scale: 3, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
                let link = document.createElement('a');
                link.download = `獲利對照報告_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL();
                link.click();
                area.classList.remove('export-mode');
            });
        }, 800);
    }
    window.onload = generateTable;
</script>
</body>
</html>
